services:
  claude-chat:
    build: .
    container_name: claude-chat
    restart: always
    ports:
      - "3899:3899"
    env_file:
      - .env
    volumes:
      - chat_uploads:/app/data/uploads
    networks:
      - n8n_default

volumes:
  chat_uploads:

networks:
  n8n_default:
    external: true
